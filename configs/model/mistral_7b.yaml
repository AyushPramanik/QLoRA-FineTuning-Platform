# Model configuration — Mistral 7B Instruct v0.3

name_or_path: mistralai/Mistral-7B-Instruct-v0.3
revision: main
trust_remote_code: false
torch_dtype: bfloat16
attn_implementation: flash_attention_2

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

# VRAM estimate at 4-bit: ~5 GB
# Compatible with: A100-40G, A10G-24G, RTX 3090/4090
