# Default QLoRA training configuration
# Tuned for single-GPU training on an A100-80G or two A10G-24G

output_dir: /data/outputs/qlora-run
run_name: qlora-llama3-8b-alpaca

# Training duration
num_train_epochs: 3
max_steps: -1             # -1 means use num_train_epochs

# Batch size & accumulation
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
# Effective batch size = 4 * 8 = 32

# Sequence length
max_seq_length: 2048
group_by_length: true     # Group similar-length examples to minimise padding

# Optimiser
optim: paged_adamw_32bit
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.001
max_grad_norm: 1.0

# Precision
fp16: false
bf16: true

# Memory
gradient_checkpointing: true
dataloader_num_workers: 4
dataloader_pin_memory: true

# Checkpointing
save_strategy: steps
save_steps: 200
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss

# Evaluation
evaluation_strategy: steps
eval_steps: 200

# Logging
logging_strategy: steps
logging_steps: 10
report_to:
  - wandb
logging_dir: /data/logs

# Packing (fill sequences to max_seq_length for efficiency)
packing: false
