apiVersion: apps/v1
kind: Deployment
metadata:
  name: qlora-inference
  namespace: qlora-inference
  labels:
    app: qlora-inference
    component: serving
    version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qlora-inference
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: qlora-inference
        component: serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-a10g

      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: model-store-pvc

      containers:
        - name: inference-api
          image: your-registry/qlora-inference:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"

          env:
            - name: MODEL_PATH
              value: /models/llama3-8b-merged
            - name: API_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: json

          volumeMounts:
            - name: model-store
              mountPath: /models
              readOnly: true

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: qlora-inference-svc
  namespace: qlora-inference
  labels:
    app: qlora-inference
spec:
  type: ClusterIP
  selector:
    app: qlora-inference
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
