# Prometheus scrape configuration for the QLoRA platform
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: qlora-finetuning-platform
    environment: development

scrape_configs:
  # ── Inference API ─────────────────────────────────────────────────────────
  - job_name: qlora-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── DCGM GPU exporter (if available) ──────────────────────────────────────
  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]
